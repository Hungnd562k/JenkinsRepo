services:
  app:
    build:
      context: .
      args:
        - DOCKER_GID=986 # Thay bằng số GID bạn tìm được ở Bước 1
    container_name: agent1
    ports:
      - "4444:22"
    environment:
      JENKINS_AGENT_SSH_PUBKEY: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIAPgAt9fhXzbegtlmv1GaU5Gci4Su+5DGwGDdSop6bDy ubuntu@ip-172-31-78-190"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - jenkins_network
  
  networks:
    jenkins_network:
      external: true
      name: jenkins